<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Thread - BlogAlone</title>
  <link rel="stylesheet" href="/static/css/retro.css">
  <script src="/static/js/api.js" defer></script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <nav class="site-nav" aria-label="Primary">
      <a class="brand" href="/">BlogAlone</a>
      <div class="nav-links">
        <a href="/">Forums</a>
      </div>
    </nav>
  </header>
  <main id="main" class="page-shell">
    <article class="content-panel thread-shell" aria-labelledby="thread-title">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Thread</p>
          <h1 id="thread-title">Thread detail</h1>
        </div>
        <span class="status-pill">Read only</span>
      </div>
      <div class="empty-state">
        <p>No posts yet.</p>
      </div>
    </article>
  </main>
  <footer class="site-footer">
    <p>BlogAlone MVP</p>
  </footer>
</body>
</html>
